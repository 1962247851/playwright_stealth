name: CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

env:
  DOTNET_VERSION: '8.0.x'
  PLAYWRIGHT_INSTALL_DEPS: '1'

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore OrdinaryRoad.Playwright.Stealth.sln

    - name: Build
      run: dotnet build OrdinaryRoad.Playwright.Stealth.sln --configuration Release --no-restore

    - name: Test
      run: dotnet test OrdinaryRoad.Playwright.Stealth.sln --configuration Release --no-build --verbosity normal
